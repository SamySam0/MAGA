model:
  GraphRNN:
    embedding_size: 32
    hidden_size: 64
    num_layers: 4
  EdgeRNN:
    embedding_size: 8
    hidden_size: 16
    num_layers: 4

data:
  dataset: 'community-small'
  m: 20
  train_split: 0.8
  valid_split: 0.1
  test_split: 0.1

train:
  epochs: 256
  batch_size: 32
  lr: 0.003
  lr_schedule_milestones: [2400, 3000]  # Milestones for the learning rate schedule
  lr_schedule_gamma: 0.3                # Change rate for the learning rate schedule
  checkpoint_epochs: 10                 # Save checkpoint every X epochs
  checkpoint_dir: "./checkpoints"       # Checkpoint path relative to config file directory
  log_dir: "./log"                      # Save log data in this directory